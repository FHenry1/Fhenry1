<svg xmlns="http://www.w3.org/2000/svg" width="120" height="150" viewBox="0 0 120 150" fill="none">
  <!-- Map pin outline (white) -->
  <path d="M60 6C33.5 6 12 27.5 12 54c0 33 48 90 48 90s48-57 48-90C108 27.5 86.5 6 60 6z"
        fill="none" stroke="#ffffff" stroke-width="7" stroke-linejoin="round"/>

  <!-- Hamburger inside the pin -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top bun -->
    <path d="M38 40c0-8 9.9-14 22-14s22 6 22 14z" fill="#ffffff" stroke="none"/>
    <!-- Sesame seeds -->
    <circle cx="52" cy="34" r="1.6" fill="#ffffff" stroke="none"/>
    <circle cx="60" cy="31" r="1.6" fill="#ffffff" stroke="none"/>
    <circle cx="68" cy="34" r="1.6" fill="#ffffff" stroke="none"/>
    <!-- Lettuce / patty lines -->
    <line x1="38" y1="47" x2="82" y2="47"/>
    <line x1="38" y1="55" x2="82" y2="55"/>
    <!-- Bottom bun -->
    <path d="M38 63c0 6 9.9 9 22 9s22-3 22-9z" fill="#ffffff" stroke="none"/>
  </g>
</svg>
